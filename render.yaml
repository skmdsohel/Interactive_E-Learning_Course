# Render blueprint — https://render.com/docs/blueprint-spec
#
# Deploys two services from a single repo:
#   1. learnsphere-backend  — Dockerised FastAPI app (uses backend/Dockerfile)
#   2. learnsphere-frontend — Static site built with Vite
#
# Secrets (sync: false) must be set in the Render dashboard after first apply.
# Required: DATABASE_URL, GOOGLE_CLIENT_ID, ADMIN_EMAILS, CORS_ORIGINS,
#           R2_ENDPOINT_URL, R2_BUCKET, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#           VITE_API_BASE_URL, VITE_GOOGLE_CLIENT_ID.

services:
  - type: web
    name: learnsphere-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/live
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_JSON
        value: "true"
      # Disable on-startup disk scan: production catalog lives in MySQL only.
      - key: AUTO_SEED_ON_STARTUP
        value: "false"
      - key: AUTO_SEED_PRUNE_MISSING
        value: "false"
      - key: STORAGE_BACKEND
        value: r2
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: JWT_SECRET
        generateValue: true
      # Connection string from PlanetScale. Paste the URL from
      # PlanetScale → Branches → main → Connect → "General" as-is, e.g.
      #   mysql://USER:PASSWORD@aws.connect.psdb.cloud/DBNAME?sslaccept=strict
      # The backend rewrites it for PyMySQL and enables TLS automatically
      # based on the *.psdb.cloud hostname.
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      # Comma-separated frontend origins, e.g.
      # https://learnsphere-frontend.onrender.com
      - key: CORS_ORIGINS
        sync: false
      # Cloudflare R2 / S3-compatible bucket holding uploaded videos.
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      # Optional. Public custom domain attached to the bucket; if set, the
      # streaming endpoint redirects here instead of generating presigned URLs.
      - key: R2_PUBLIC_BASE_URL
        sync: false

  - type: web
    name: learnsphere-frontend
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    # SPA fallback so React Router deep links resolve.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Full URL of the backend service, e.g.
      # https://learnsphere-backend.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
